<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Digital Clock</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #0a0a0a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      .clock-wrapper {
        text-align: center;
      }

      .date {
        font-size: 14px;
        font-weight: 400;
        color: #4b5563;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 24px;
      }

      .time {
        font-size: 96px;
        font-weight: 200;
        color: #f1f5f9;
        letter-spacing: -2px;
        line-height: 1;
      }

      .time .separator {
        color: #334155;
        animation: blink 1s step-end infinite;
      }

      .ampm {
        font-size: 14px;
        font-weight: 400;
        color: #475569;
        letter-spacing: 3px;
        margin-top: 20px;
      }

      .divider {
        width: 40px;
        height: 1px;
        background: #1e293b;
        margin: 20px auto;
      }

      .timezone {
        font-size: 11px;
        color: #334155;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="clock-wrapper">
      <div class="date" id="date"></div>

      <div class="time">
        <span id="hours"></span>
        <span class="separator">:</span>
        <span id="minutes"></span>
        <span class="separator">:</span>
        <span id="seconds"></span>
      </div>

      <div class="ampm" id="ampm"></div>

      <div class="divider"></div>

      <div class="timezone" id="timezone"></div>
    </div>

    <script>
      function updateClock() {
        const now = new Date();

        // Time
        let hours = now.getHours();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        const ampm = hours >= 12 ? "PM" : "AM";

        hours = hours % 12 || 12;

        document.getElementById("hours").textContent = String(hours).padStart(
          2,
          "0",
        );
        document.getElementById("minutes").textContent = String(
          minutes,
        ).padStart(2, "0");
        document.getElementById("seconds").textContent = String(
          seconds,
        ).padStart(2, "0");
        document.getElementById("ampm").textContent = ampm;

        // Date
        const days = [
          "Sunday",
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday",
        ];
        const months = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];

        const dayName = days[now.getDay()];
        const monthName = months[now.getMonth()];
        const date = now.getDate();
        const year = now.getFullYear();

        document.getElementById("date").textContent =
          `${dayName}, ${monthName} ${date}, ${year}`;

        // Timezone
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        document.getElementById("timezone").textContent = tz;
      }

      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
